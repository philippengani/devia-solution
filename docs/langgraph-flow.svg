<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">LangGraph workflow</title>
  <desc id="desc">Flow from POST analyze to plan analysis, product collection, conditional sentiment, trend analysis, report generation, and JSON response.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#23404a"/>
    </marker>
    <style>
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #12303a;
      }
      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #23404a;
      }
      .box {
        fill: #eef7f8;
        stroke: #23404a;
        stroke-width: 2;
      }
      .decision {
        fill: #fff8e8;
        stroke: #8a6a21;
        stroke-width: 2;
      }
      .line {
        stroke: #23404a;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect x="40" y="40" width="230" height="56" rx="12" class="box"/>
  <text x="155" y="75" text-anchor="middle" class="label">API request: POST /analyze</text>

  <rect x="365" y="40" width="190" height="56" rx="12" class="box"/>
  <text x="460" y="75" text-anchor="middle" class="label">plan_analysis</text>

  <rect x="650" y="40" width="220" height="56" rx="12" class="box"/>
  <text x="760" y="75" text-anchor="middle" class="label">collect_product_data</text>

  <polygon points="760,145 875,200 760,255 645,200" class="decision"/>
  <text x="760" y="192" text-anchor="middle" class="label">Customer reviews</text>
  <text x="760" y="216" text-anchor="middle" class="label">provided?</text>

  <rect x="520" y="325" width="210" height="56" rx="12" class="box"/>
  <text x="625" y="360" text-anchor="middle" class="label">analyze_sentiment</text>

  <rect x="790" y="325" width="170" height="56" rx="12" class="box"/>
  <text x="875" y="360" text-anchor="middle" class="label">skip_sentiment</text>

  <rect x="650" y="430" width="190" height="56" rx="12" class="box"/>
  <text x="745" y="465" text-anchor="middle" class="label">analyze_trend</text>

  <rect x="365" y="430" width="190" height="56" rx="12" class="box"/>
  <text x="460" y="465" text-anchor="middle" class="label">generate_report</text>

  <rect x="70" y="430" width="200" height="56" rx="12" class="box"/>
  <text x="170" y="465" text-anchor="middle" class="label">JSON response</text>

  <path d="M 270 68 L 365 68" class="line"/>
  <path d="M 555 68 L 650 68" class="line"/>
  <path d="M 760 96 L 760 145" class="line"/>
  <path d="M 710 229 L 654 325" class="line"/>
  <path d="M 810 229 L 847 325" class="line"/>
  <path d="M 625 381 L 700 430" class="line"/>
  <path d="M 875 381 L 790 430" class="line"/>
  <path d="M 650 458 L 555 458" class="line"/>
  <path d="M 365 458 L 270 458" class="line"/>

  <text x="675" y="292" class="small">Yes</text>
  <text x="832" y="292" class="small">No</text>
</svg>
